name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build the daemon + plugin and attach them to the GitHub Release.
  # Runs only on version tags (v*).
  build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, edition 2024)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build + package
        shell: pwsh
        run: ./scripts/package-release.ps1

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/studio-stud.exe
            dist/StudioStud.plugin.lua

  # Publish the committed static site/ (install.ps1, latest.json, index.html).
  # Deploys from main (and manual dispatch) — the github-pages environment only
  # permits the default branch, so this must NOT run from a tag.
  deploy-pages:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
