name: Deploy

# Runs on every push to either permanent branch.
#   development → encrypts + publishes dev channel    (site/dev/)
#   beta        → encrypts + publishes beta channel   (site/beta/)
#   main        → publishes release channel           (site/)
#                 + creates a GitHub Release on version tags
#
# Required GitHub Actions secrets (Settings → Secrets → Actions):
#   CHANNEL_SIGNING_KEY  — 64-byte ed25519 private key in hex (from scripts/keygen.ps1)
#   DEV_CHANNEL_PASSWORD — password dev testers use at install time
#   BETA_CHANNEL_PASSWORD — password beta testers use at install time
#   (main/release needs no password — artifacts are public)

on:
  push:
    branches: [main, development, beta]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# ──────────────────────────────────────────────
jobs:

  # ── 1. Build ─────────────────────────────────
  build:
    name: Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace + package
        shell: pwsh
        run: ./scripts/package-release.ps1

      - name: Run tests
        run: cargo test --workspace

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

      - name: Upload generated manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ github.sha }}
          path: site/latest.json
          retention-days: 7

  # ── 2a. Publish release channel (main) ───────
  deploy-release:
    name: Publish → release channel
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Download generated manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest-${{ github.sha }}
          path: manifest/

      - name: Use generated manifest (overwrite committed)
        run: cp manifest/latest.json site/latest.json

      # Guard: never publish the release manifest ahead of its GitHub Release.
      # The manifest (this job, on main) and the release assets (github-release
      # job, on a v* tag) are published by independent triggers — so a version
      # can be advertised before its artifacts exist (the v0.4.10 install-404
      # incident). Fail here unless every asset the manifest points at is already
      # downloadable. Correct order: push the v<version> tag FIRST so the release
      # is built, then merge to main to publish the manifest.
      - name: Verify release assets exist before publishing manifest
        run: |
          VER=$(jq -r .daemonVersion manifest/latest.json)
          TAG="v$VER"
          echo "Manifest declares $TAG — verifying its GitHub Release assets exist..."
          MISSING=0
          for ASSET in studio-stud.exe studio-stud-setup.exe StudioStud.plugin.lua studio-stud-bundle.zip; do
            URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$ASSET"
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -L "$URL")
            if [ "$CODE" = "200" ]; then
              echo "  ok    $ASSET"
            else
              echo "  MISS  $ASSET (HTTP $CODE)"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "::error::Refusing to publish the release manifest for $TAG — its GitHub Release assets are missing (404). Push the $TAG tag first so the github-release job builds and uploads them, then re-run this deploy."
            exit 1
          fi
          echo "All $TAG assets present — safe to publish manifest."

      - name: Deploy site/ to gh-pages (release channel root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          destination_dir: .
          keep_files: true

  # ── 2b. Publish dev channel ──────────────────
  deploy-dev:
    name: Publish → dev channel
    needs: build
    if: github.ref == 'refs/heads/development'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Download generated manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest-${{ github.sha }}
          path: manifest/

      - name: Encrypt artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force site/dev | Out-Null
          cargo run --quiet --example encrypt-artifact -- `
            --password "$env:DEV_CHANNEL_PASSWORD" `
            --input  dist/studio-stud-bundle.zip `
            --output site/dev/studio-stud-bundle.zip.enc
        env:
          DEV_CHANNEL_PASSWORD: ${{ secrets.DEV_CHANNEL_PASSWORD }}

      - name: Build + sign manifest
        shell: pwsh
        run: |
          # Read live gh-pages sequence — repo checkout never stores the previous manifest.
          $prevSeq = 0
          try {
            $live = Invoke-RestMethod 'https://tyleradams2002.github.io/studio-stud/dev/latest.json' -ErrorAction Stop
            if ($live.channelSequence) { $prevSeq = [int]$live.channelSequence }
          } catch { $prevSeq = 0 }
          $nextSeq = $prevSeq + 1

          # Base off the CI-generated manifest (actual built version), not the committed file.
          $base     = Get-Content manifest/latest.json -Raw | ConvertFrom-Json
          $pagesBase = 'https://tyleradams2002.github.io/studio-stud'

          $manifest = $base | Select-Object *
          $manifest | Add-Member -NotePropertyName channelSequence -NotePropertyValue $nextSeq     -Force
          $manifest | Add-Member -NotePropertyName bundleEncUrl    -NotePropertyValue "$pagesBase/dev/studio-stud-bundle.zip.enc" -Force
          $manifest.PSObject.Properties.Remove('setupUrl')
          $manifest.PSObject.Properties.Remove('bundleUrl')

          $unsigned = 'site/dev/latest.unsigned.json'
          $manifest | ConvertTo-Json -Depth 10 | Set-Content $unsigned -Encoding utf8
          $sigB64 = cargo run --quiet --example sign-manifest -- `
            --privkey "$env:CHANNEL_SIGNING_KEY" `
            --manifest $unsigned
          if ($LASTEXITCODE -ne 0) { throw "sign-manifest failed" }

          $manifest | Add-Member -NotePropertyName signature -NotePropertyValue $sigB64.Trim() -Force
          $manifest | ConvertTo-Json -Depth 10 | Set-Content site/dev/latest.json -Encoding utf8
          Remove-Item site/dev/latest.unsigned.json -ErrorAction SilentlyContinue
          Write-Host "Dev manifest written (seq $nextSeq)"
        env:
          CHANNEL_SIGNING_KEY: ${{ secrets.CHANNEL_SIGNING_KEY }}

      - name: Deploy site/dev to gh-pages/dev
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site/dev
          destination_dir: dev
          keep_files: true

  # ── 2c. Publish beta channel ─────────────────
  deploy-beta:
    name: Publish → beta channel
    needs: build
    if: github.ref == 'refs/heads/beta'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Download generated manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest-${{ github.sha }}
          path: manifest/

      - name: Encrypt bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force site/beta | Out-Null
          cargo run --quiet --example encrypt-artifact -- `
            --password "$env:BETA_CHANNEL_PASSWORD" `
            --input  dist/studio-stud-bundle.zip `
            --output site/beta/studio-stud-bundle.zip.enc
        env:
          BETA_CHANNEL_PASSWORD: ${{ secrets.BETA_CHANNEL_PASSWORD }}

      - name: Build + sign manifest
        shell: pwsh
        run: |
          $prevSeq = 0
          try {
            $live = Invoke-RestMethod 'https://tyleradams2002.github.io/studio-stud/beta/latest.json' -ErrorAction Stop
            if ($live.channelSequence) { $prevSeq = [int]$live.channelSequence }
          } catch { $prevSeq = 0 }
          $nextSeq = $prevSeq + 1
          # Base off the CI-generated manifest (actual built version), not the committed file.
          $base = Get-Content manifest/latest.json -Raw | ConvertFrom-Json
          $pagesBase = 'https://tyleradams2002.github.io/studio-stud'
          $manifest = $base | Select-Object *
          $manifest | Add-Member -NotePropertyName channelSequence -NotePropertyValue $nextSeq -Force
          $manifest | Add-Member -NotePropertyName bundleEncUrl -NotePropertyValue "$pagesBase/beta/studio-stud-bundle.zip.enc" -Force
          $manifest.PSObject.Properties.Remove('setupUrl')
          $manifest.PSObject.Properties.Remove('bundleUrl')
          $unsigned = 'site/beta/latest.unsigned.json'
          $manifest | ConvertTo-Json -Depth 10 | Set-Content $unsigned -Encoding utf8
          $sigB64 = cargo run --quiet --example sign-manifest -- `
            --privkey "$env:CHANNEL_SIGNING_KEY" --manifest $unsigned
          if ($LASTEXITCODE -ne 0) { throw "sign-manifest failed" }
          $manifest | Add-Member -NotePropertyName signature -NotePropertyValue $sigB64.Trim() -Force
          $manifest | ConvertTo-Json -Depth 10 | Set-Content site/beta/latest.json -Encoding utf8
          Remove-Item $unsigned -ErrorAction SilentlyContinue
        env:
          CHANNEL_SIGNING_KEY: ${{ secrets.CHANNEL_SIGNING_KEY }}

      - name: Deploy site/beta to gh-pages/beta
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site/beta
          destination_dir: beta
          keep_files: true

  # ── 3. GitHub Release (version tags only) ─────
  github-release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/studio-stud.exe
            dist/studio-stud-setup.exe
            dist/StudioStud.plugin.lua
            dist/studio-stud-bundle.zip
